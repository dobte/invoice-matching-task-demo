<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Matching Task — Configurator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Bundle loaded synchronously so the custom element is defined before the inline script runs. -->
  <script src="./invoice-matching-task.js"></script>
  <style>
    :root {
      --paper: #f0f2f5;
      --ink: #1d1c1a;
      --muted: #6f6a61;
      --line: #e0e0e0;
      --card: #ffffff;
      --brand: #111111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: 32px 20px 80px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 41px;
      line-height: 1.05;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }

    .sub {
      color: var(--muted);
      font-size: 15px;
    }

    /* ---- Configurator layout ---- */
    .config-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 22px;
      align-items: start;
      margin-top: 32px;
    }

    @media(max-width:880px) {
      .config-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    #event-log-panel {
      max-width: 640px;
    }

    .panel-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-head h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .panel-head .ic {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand);
    }

    .panel-body {
      padding: 6px 18px 16px;
    }

    .group {
      padding: 14px 0;
      border-bottom: 1px dashed var(--line);
    }

    .group:last-child {
      border-bottom: none;
    }

    .group > .glabel {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      width: 100%;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      text-align: left;
    }

    .group > .glabel:hover {
      color: var(--ink);
    }

    .chevron {
      font-size: 10px;
      transition: transform 0.2s ease;
      flex: none;
    }

    .group--open > .glabel .chevron {
      transform: rotate(90deg);
    }

    .group-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease;
    }

    .group--open > .group-body {
      max-height: 1200px;
      padding-top: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 9px 0;
      font-size: 14.5px;
    }

    .row label:not(.sw) {
      color: var(--ink);
      flex: 1;
    }

    .row .hint {
      display: block;
      color: var(--muted);
      font-size: 12.5px;
      margin-top: 1px;
    }

    /* toggle */
    .sw {
      position: relative;
      width: 40px;
      height: 22px;
      flex: none;
      cursor: pointer;
    }

    .sw input {
      display: none;
    }

    .sw span {
      position: absolute;
      inset: 0;
      background: #cfc9bd;
      border-radius: 20px;
      transition: .2s;
    }

    .sw span:before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }

    .sw input:checked + span {
      background: var(--brand);
    }

    .sw input:checked + span:before {
      transform: translateX(18px);
    }

    select,
    input[type='number'] {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfaf7;
      color: var(--ink);
      width: 96px;
    }

    input[type='number'] {
      width: 64px;
    }

    input[type='text'] {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfaf7;
      color: var(--ink);
      width: 120px;
    }

    input[type='color'] {
      width: 36px;
      height: 28px;
      padding: 2px 3px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfaf7;
      cursor: pointer;
    }

    .seg {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
    }

    .seg button {
      appearance: none;
      border: none;
      background: #fbfaf7;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 5px 10px;
      color: var(--muted);
    }

    .seg button.on {
      background: var(--brand);
      color: #fff;
    }

    .disabled-soft {
      opacity: .4;
      pointer-events: none;
      transition: .2s;
    }

    .mute-checks {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .mute-checks label {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12.5px;
      color: var(--ink);
      cursor: pointer;
    }

    .mute-checks input[type='checkbox'] {
      width: 13px;
      height: 13px;
      flex: none;
      cursor: pointer;
      accent-color: var(--brand);
    }

    .ev-hint {
      width: 100%;
      margin-left: 20px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .code-tabs {
      display: flex;
      gap: 1px;
      margin-top: 8px;
      align-items: flex-end;
    }

    #downloadLiveHtmlBtn {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfaf7;
      color: var(--ink);
      cursor: pointer;
    }

    #downloadLiveHtmlBtn:hover {
      background: var(--brand);
      color: #fff;
    }

    /* preview + code */
    .preview-stack {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .preview-block {
      position: relative;
    }

    .preview-block > .pv-head {
      position: absolute;
      left: 0;
      right: 0;
      top: -20px;
      margin-bottom: 0;
    }

    .preview-block > #livePreview {
      margin-top: 0;
    }

    .pv-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      max-width: 640px;
    }

    .pv-head .t {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pv-head .badge {
      font-size: 12px;
      background: #eee;
      color: var(--muted);
      padding: 2px 9px;
      border-radius: 20px;
    }

    .code {
      background: #181a1a;
      border-radius: 14px;
      padding: 18px 20px;
      position: relative;
    }

    .code pre {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13.3px;
      line-height: 1.7;
      color: #d6e8e6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .code .k {
      color: #7fc9c3;
    }

    .code .a {
      color: #e0b86a;
    }

    .code .v {
      color: #c5d96b;
    }

    .code .c {
      color: #6b7472;
      font-style: italic;
    }

    .copy {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      background: #2a2d2d;
      color: #9fb3b1;
      border: none;
      border-radius: 6px;
      padding: 5px 9px;
      cursor: pointer;
    }

    .copy:hover {
      background: #343838;
    }

    invoice-matching-task {
      display: block;
    }

    #lifecycle-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      max-width: 640px;
    }

    .lc-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12.5px;
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfaf7;
      color: var(--ink);
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .lc-btn:hover:not(:disabled) {
      background: var(--brand);
      color: #fff;
    }

    .lc-btn:disabled {
      opacity: .35;
      cursor: default;
    }

    /* ---- Event log ---- */
    #event-log-body {
      max-height: 260px;
      overflow-y: auto;
    }

    .ev-row {
      border-bottom: 1px dashed var(--line);
      margin: 0;
    }

    .ev-row:last-child {
      border-bottom: none;
    }

    .ev-row > summary {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12.5px;
      padding: 5px 18px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ev-row > summary::-webkit-details-marker { display: none; }

    .ev-row > summary::before {
      content: '▶';
      font-size: 9px;
      color: var(--muted);
      flex: none;
      transition: transform .15s;
    }

    .ev-row[open] > summary::before { transform: rotate(90deg); }

    .ev-detail {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      line-height: 1.55;
      padding: 4px 18px 10px 34px;
      background: var(--paper);
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    .ev-correct > summary { color: #16a34a; }
    .ev-wrong   > summary { color: #dc2626; }
    .ev-error   > summary { color: #dc2626; font-weight: 600; }
    .ev-finish  > summary { color: var(--muted); font-style: italic; }

    .val-msg {
      display: none;
      font-size: 12.5px;
      color: #92400e;
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 0 4px 4px 0;
      padding: 4px 8px;
      margin: -4px 0 6px;
      line-height: 1.4;
    }

    .val-msg.visible {
      display: block;
    }

    /* ---- Top-level tab bar ---- */
    .top-tabs {
      display: flex;
      border-bottom: 2px solid var(--line);
      margin-top: 24px;
    }

    .top-tab {
      padding: 10px 22px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.15s;
    }

    .top-tab.on {
      color: var(--ink);
      border-bottom-color: var(--brand);
    }

    .top-tab:hover {
      color: var(--ink);
    }

    .lv-wrap {
      margin-top: 28px;
    }

  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Invoice Matching Task</h1>
      <p class="sub">Configure &amp; preview the task · copy generated code.</p>
    </header>

    <nav class="top-tabs" role="tablist">
      <button class="top-tab on" id="toptab-configure" role="tab" aria-selected="true" aria-controls="panel-configure">Configure</button>
      <button class="top-tab" id="toptab-gencode" role="tab" aria-selected="false" aria-controls="panel-gencode">Generated Code</button>
    </nav>

    <div id="panel-configure" role="tabpanel" aria-labelledby="toptab-configure">
    <div class="config-grid">

      <!-- ---- Left: controls ---- -->
      <div class="panel">
        <div class="panel-head">
          <span class="ic"></span>
          <h3>Configuration</h3>
        </div>
        <div class="panel-body" id="ctrls">

          <div class="group group--open">
            <button class="glabel" aria-expanded="true">Difficulty <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>Adaptive difficulty<span class="hint">performance-based level up/down</span></label>
              <label class="sw"><input type="checkbox" id="c_flow" checked><span></span></label>
            </div>
            <div class="row">
              <label>Start difficulty<span class="hint">↺ restarts preview</span></label>
              <select id="c_startlvl">
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
              </select>
            </div>
            <div class="val-msg" id="val_startlvl" role="alert"></div>
            <div class="row">
              <label>Min difficulty<span class="hint">↺ restarts preview</span></label>
              <select id="c_minlvl">
                <option selected>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
              </select>
            </div>
            <div class="val-msg" id="val_minlvl" role="alert"></div>
            <div class="row">
              <label>Max difficulty<span class="hint">↺ restarts preview</span></label>
              <select id="c_maxlvl">
                <option>1</option><option>2</option><option selected>3</option>
                <option>4</option><option>5</option><option>6</option>
              </select>
            </div>
            <div class="val-msg" id="val_maxlvl" role="alert"></div>
            <div class="row" id="wrap_thr">
              <label>Level up / down after</label>
              <span>
                <input type="number" id="c_up" value="4" min="1" max="20" style="width:48px"> /
                <input type="number" id="c_down" value="4" min="1" max="20" style="width:48px">
              </span>
            </div>
            <div class="row">
              <label>Show difficulty<span class="hint">participant-facing level indicator</span></label>
              <label class="sw"><input type="checkbox" id="c_lvl"><span></span></label>
            </div>
            </div>
          </div>

          <div class="group group--open">
            <button class="glabel" aria-expanded="true">Feedback <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>Show answer feedback<span class="hint">correct → green / wrong → red</span></label>
              <label class="sw"><input type="checkbox" id="c_fb" checked><span></span></label>
            </div>
            </div>
          </div>

          <div class="group group--open">
            <button class="glabel" aria-expanded="true">Timing <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>Show timer</label>
              <label class="sw"><input type="checkbox" id="c_tl" checked><span></span></label>
            </div>
            <div class="row">
              <label>Task duration (seconds)<span class="hint">↺ restarts preview · 0 = no limit</span></label>
              <input type="number" id="c_totaltl_min" value="300" min="0" max="3600">
            </div>
            <div class="row">
              <label>Enable round timer<span class="hint">↺ restarts preview</span></label>
              <label class="sw"><input type="checkbox" id="c_round_timer"><span></span></label>
            </div>
            <div class="row" id="wrap_round_duration">
              <label>Round duration (seconds)<span class="hint">↺ restarts preview</span></label>
              <input type="number" id="c_round_duration" value="30" min="1" max="600">
            </div>
            </div>
          </div>

          <div class="group group--open">
            <button class="glabel" aria-expanded="true">Task volume <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>End after N submissions<span class="hint">0 = no limit</span></label>
              <input type="number" id="c_max" value="20" min="0" max="200">
            </div>
            <div class="row">
              <label>End after N correct<span class="hint">0 = no limit</span></label>
              <input type="number" id="c_maxcorrect" value="0" min="0" max="200">
            </div>
            <div class="row">
              <label>Invoices per round<span class="hint">↺ restarts preview</span></label>
              <input type="number" id="c_perround" value="8" min="3" max="12">
            </div>
            <div class="row">
              <label>Invoice order<span class="hint">↺ restarts preview</span></label>
              <div class="seg" id="seg_order">
                <button data-v="random" class="on">Random</button>
                <button data-v="fixed">Fixed</button>
              </div>
            </div>
            </div>
          </div>

          <div class="group">
            <button class="glabel" aria-expanded="false">Session <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>Auto-start<span class="hint">adds auto-start to the snippet only · live preview unaffected</span></label>
              <label class="sw"><input type="checkbox" id="c_autostart"><span></span></label>
            </div>
            <div class="row">
              <label>Session ID<span class="hint">echoed on every event</span></label>
              <input type="text" id="c_sessionid" placeholder="(none)" autocomplete="off">
            </div>
            <div class="row" id="wrap_seed">
              <label>Random seed<span class="hint">↺ restarts preview · fixed order only</span></label>
              <input type="text" id="c_seed" placeholder="(none)" autocomplete="off">
            </div>
            <div class="row" style="flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:4px">
              <label style="flex:none">Completed message<span class="hint">plain text shown at task end</span></label>
              <input type="text" id="c_completedmsg"
                placeholder="You have completed all invoice matching tasks."
                style="width:100%">
            </div>
            </div>
          </div>

          <div class="group">
            <button class="glabel" aria-expanded="false">Logging <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>Log level</label>
              <div class="seg" id="seg_loglevel">
                <button data-v="basic" class="on">basic</button>
                <button data-v="detailed">detailed</button>
                <button data-v="debug">debug</button>
              </div>
            </div>
            <div class="row" style="align-items:flex-start">
              <label>Mute events<span class="hint">suppress from log</span></label>
              <div class="mute-checks" id="muted_checks">
                <label><input type="checkbox" data-ev="roundStarted"> roundStarted<span class="ev-hint">targetAmount · visibleInvoices · correctInvoiceIds</span></label>
                <label><input type="checkbox" data-ev="selectionChanged"> selectionChanged<span class="ev-hint">invoiceId · isChecked · currentSum · roundRelativeTimeMs</span></label>
                <label><input type="checkbox" data-ev="roundSubmitted"> roundSubmitted<span class="ev-hint">isCorrect · reactionTimeMs · selectedInvoiceIds · timedOut</span></label>
                <label><input type="checkbox" data-ev="difficultyChanged"> difficultyChanged<span class="ev-hint">fromLevel · toLevel · reason</span></label>
                <label><input type="checkbox" data-ev="taskPaused"> taskPaused<span class="ev-hint">currentSelection</span></label>
                <label><input type="checkbox" data-ev="taskResumed"> taskResumed<span class="ev-hint">pausedDurationMs</span></label>
              </div>
            </div>
            </div>
          </div>

          <div class="group">
            <button class="glabel" aria-expanded="false">Appearance <span class="chevron" aria-hidden="true">▶</span></button>
            <div class="group-body">
            <div class="row">
              <label>Primary colour</label>
              <input type="color" id="c_color_primary" value="#111111">
            </div>
            <div class="row">
              <label>Background</label>
              <input type="color" id="c_color_bg" value="#ffffff">
            </div>
            <div class="row">
              <label>Border colour</label>
              <input type="color" id="c_color_border" value="#e0e0e0">
            </div>
            <div class="row">
              <label>Highlight colour</label>
              <input type="color" id="c_color_hi" value="#f0f0f0">
            </div>
            <div class="row">
              <label>Font family<span class="hint">CSS font-family value</span></label>
              <input type="text" id="c_font" placeholder="system-ui, sans-serif" style="width:130px">
            </div>
            </div>
          </div>

        </div>
      </div>

      <!-- ---- Right: preview + code ---- -->
      <div class="preview-stack">
        <div class="preview-block">
          <div class="pv-head">
            <span class="t">Live preview</span>
          </div>
          <div id="livePreview"></div>
          <div id="lifecycle-btns" role="toolbar" aria-label="Preview controls">
            <button id="btn_start"  class="lc-btn">Start</button>
            <button id="btn_pause"  class="lc-btn" disabled>Pause</button>
            <button id="btn_resume" class="lc-btn" disabled>Resume</button>
            <button id="btn_stop"   class="lc-btn" disabled>Stop</button>
            <button id="btn_reset"  class="lc-btn" disabled>Reset</button>
          </div>
        </div>
        <!-- ---- Event log panel ---- -->
        <div class="panel" id="event-log-panel">
          <div class="panel-head">
            <span class="ic"></span>
            <h3>Event log</h3>
            <button id="clear-log-btn" class="lc-btn" style="margin-left:auto;padding:2px 9px;font-size:11.5px">clear</button>
          </div>
          <div id="event-log-body">
            <p id="event-log-empty" style="font-size:13px;color:var(--muted);padding:10px 18px;margin:0;font-style:italic">Start a task to see events.</p>
            <div id="event-log-list"></div>
          </div>
        </div>

      </div>

    </div>
    </div><!-- /panel-configure -->

    <div id="panel-gencode" role="tabpanel" aria-labelledby="toptab-gencode" hidden>
      <div class="lv-wrap">
        <div class="pv-head">
          <span class="t">Generated code</span>
          <span class="badge">paste into invoice_task_unified's InvoiceTaskUnified.html</span>
        </div>
        <div class="code-tabs">
          <button id="downloadLiveHtmlBtn">↓ Download InvoiceTaskUnified.html</button>
        </div>
        <div class="code" style="margin-top: 0; border-radius: 0 14px 14px 14px;">
          <button class="copy" id="copyBtn">copy</button>
          <pre id="snippet"></pre>
        </div>
      </div>
    </div><!-- /panel-gencode -->

  </div>

  <script>
    /* ---- CSS var defaults (used to decide when to emit in snippet) ---- */
    const CSS_DEFAULTS = {
      '--invoice-task-primary-color': '#111111',
      '--invoice-task-background': '#ffffff',
      '--invoice-task-border-color': '#e0e0e0',
      '--invoice-task-highlight-color': '#f0f0f0',
    };

    /* ---- Escaping helpers ---- */
    // Produces a valid HTML attribute value (& " < > escaped) for the generated snippet.
    function escAttr(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
    // Escapes a string for safe insertion into innerHTML (e.g. inside <pre>).
    // innerText later decodes one level, so generated-snippet text round-trips correctly.
    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    // Sanitises a value for use in a CSS property inside a generated <style> block.
    // Strips characters that can break the declaration or block structure when the
    // snippet is copy-pasted into a stylesheet:
    //   < >  — prevent </style> tag from closing the surrounding <style> block
    //   ; { } — prevent declaration termination or block escape (rule injection)
    //   \r \n — prevent line-break injection
    // style.setProperty() is an API call and does not parse CSS text, so these
    // characters are harmless there — we strip them for snippet consistency.
    function safeCssValue(str) {
      return String(str).replace(/[<>;{}\r\n]/g, '');
    }

    /* ---- Component management ---- */
    let taskEl = null;
    let previewState = 'idle';

    function updateLifecycleButtons() {
      const s = previewState;
      document.getElementById('btn_start').disabled  = s !== 'idle';
      document.getElementById('btn_pause').disabled  = s !== 'running';
      document.getElementById('btn_resume').disabled = s !== 'paused';
      document.getElementById('btn_stop').disabled   = s !== 'running' && s !== 'paused';
      document.getElementById('btn_reset').disabled  = s === 'idle';
    }

    // taskPaused / taskResumed are only emitted at logLevel:'detailed', so the event
    // listener alone is unreliable for those two. After each button click we sync
    // state directly from getSummary(); the event listener handles the rest.
    function syncStateFromElement() {
      if (!taskEl) return;
      try {
        const s = taskEl.getSummary().state;
        if (s !== previewState) {
          previewState = s;
          updateLifecycleButtons();
        }
      } catch (_) {}
    }

    function attachPreviewEventListener(el) {
      el.addEventListener('invoiceTaskEvent', (e) => {
        if (taskEl !== el) return; // stale element after rapid rebuild, ignore
        addEventToLog(e.detail);
        const type = e.detail.eventType;
        if (type === 'taskStarted') {
          previewState = 'running';
        } else if (type === 'taskFinished') {
          // Read actual post-finish state: stop/reset → 'idle', error → 'error'.
          // taskCompleted fires synchronously after taskFinished for natural end
          // and will override to 'completed' in the next branch.
          previewState = (taskEl ? taskEl.getSummary().state : null) || 'idle';
        } else if (type === 'taskCompleted') {
          previewState = 'completed';
        }
        updateLifecycleButtons();
      });
    }

    function lcClick(action) {
      if (!taskEl) return;
      try { action(); } catch (_) {}
      syncStateFromElement();
    }

    document.getElementById('btn_start').addEventListener('click',  () => lcClick(() => taskEl.start()));
    document.getElementById('btn_pause').addEventListener('click',  () => lcClick(() => taskEl.pause()));
    document.getElementById('btn_resume').addEventListener('click', () => lcClick(() => taskEl.resume()));
    document.getElementById('btn_stop').addEventListener('click',   () => lcClick(() => taskEl.stop()));
    document.getElementById('btn_reset').addEventListener('click',  () => lcClick(() => taskEl.reset()));

    const cfg = {
      autoStart: false,
      flow: true,
      startlvl: '1',
      minlvl: '1',
      maxlvl: '3',
      up: 4,
      down: 4,
      fb: true,
      lvl: false,
      tl: true,
      totaltlmin: 300,
      roundTimer: false,
      roundDuration: 30,
      max: 20,
      maxCorrect: 0,
      perround: 8,
      order: 'random',
      sessionId: '',
      randomSeed: '',
      completedMsg: '',
      completedMsgTouched: false,
      logLevel: 'basic',
      mutedEvents: new Set(),
    };

    const DEFAULT_COMPLETED_MSG = 'You have completed all invoice matching tasks.';

    function normalizeInvoiceCount(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return 8;
      return Math.max(3, Math.min(12, Math.round(parsed)));
    }

    function applyCssVars() {
      if (!taskEl) return;
      taskEl.style.setProperty('--invoice-task-primary-color', document.getElementById('c_color_primary').value);
      taskEl.style.setProperty('--invoice-task-background', document.getElementById('c_color_bg').value);
      taskEl.style.setProperty('--invoice-task-border-color', document.getElementById('c_color_border').value);
      taskEl.style.setProperty('--invoice-task-highlight-color', document.getElementById('c_color_hi').value);
      const font = safeCssValue(document.getElementById('c_font').value.trim());
      if (font) taskEl.style.setProperty('--invoice-task-font-family', font);
      else taskEl.style.removeProperty('--invoice-task-font-family');
    }

    function applyLiveOptions() {
      if (!taskEl) return;
      taskEl.adaptiveDifficulty = cfg.flow;
      taskEl.correctStreakForLevelUp = Math.max(1, cfg.up);
      taskEl.wrongStreakForLevelDown = Math.max(1, cfg.down);
      taskEl.showFeedback = cfg.fb;
      taskEl.showDifficulty = cfg.lvl;
      taskEl.showTimer = cfg.tl;
      taskEl.maxSubmissions = cfg.max > 0 ? cfg.max : null;
      taskEl.maxCorrectSubmissions = cfg.maxCorrect > 0 ? cfg.maxCorrect : null;
      taskEl.sessionId = cfg.sessionId || null;
      if (cfg.completedMsgTouched) taskEl.completedMessage = cfg.completedMsg;
      taskEl.logLevel = cfg.logLevel;
      taskEl.mutedEvents = Array.from(cfg.mutedEvents);
      applyCssVars();
    }

    function rebuildPreview() {
      const container = document.getElementById('livePreview');
      if (taskEl) {
        try { taskEl.stop(); } catch (_) {}
        taskEl.remove();
        taskEl = null;
      }
      const el = document.createElement('invoice-matching-task');
      el.setAttribute('task-duration', String(cfg.totaltlmin));
      el.setAttribute('start-difficulty', cfg.startlvl);
      el.setAttribute('min-difficulty', cfg.minlvl);
      el.setAttribute('max-difficulty', cfg.maxlvl);
      el.setAttribute('number-of-options', String(normalizeInvoiceCount(cfg.perround)));
      el.setAttribute('invoice-order', cfg.order);
      if (cfg.order === 'fixed' && cfg.randomSeed) {
        el.setAttribute('random-seed', cfg.randomSeed);
      }
      if (cfg.roundTimer && cfg.roundDuration > 0) {
        el.setAttribute('round-duration', String(cfg.roundDuration));
      }
      container.appendChild(el);
      taskEl = el;
      clearEventLog();
      attachPreviewEventListener(el);
      // Guard against rapid rebuilds: only start the element that is still current.
      // Use setTimeout(0) rather than requestAnimationFrame so the callback fires
      // even when the tab is hidden (RAF is throttled in background/preview tabs).
      customElements.whenDefined('invoice-matching-task').then(() => {
        setTimeout(() => {
          if (taskEl === el) {
            applyLiveOptions();
            el.start();
          }
        }, 0);
      });
    }

    /* ---- Event log ---- */
    function formatEventSummary(d) {
      const seq = `#${d.sequence}`;
      const rnd = d.roundIndex != null ? `Round ${d.roundIndex + 1}` : null;
      switch (d.eventType) {
        case 'taskStarted':
          return `${seq}  Task started — Lvl ${d.currentDifficulty}`;
        case 'roundStarted':
          return `${seq}  ${rnd} — target €${d.targetAmount}, ${(d.visibleInvoices || []).length} invoices`;
        case 'roundSubmitted': {
          const verdict = d.isCorrect ? 'Correct' : 'Wrong';
          const secs = typeof d.reactionTimeMs === 'number' ? ` — ${(d.reactionTimeMs / 1000).toFixed(1)} s` : '';
          const timed = d.timedOut ? ' · timed out' : '';
          return `${seq}  ${rnd} submitted — ${verdict}${secs}${timed}`;
        }
        case 'selectionChanged': {
          const action = d.isChecked ? 'checked' : 'unchecked';
          return `${seq}  ${d.invoiceId} ${action} (sum €${d.currentSum})`;
        }
        case 'difficultyChanged': {
          const reasonMap = { streak_up: 'streak up', streak_down: 'streak down', config_clamp: 'config clamp' };
          const reason = reasonMap[d.reason] || (d.reason || '').replace(/_/g, ' ');
          return `${seq}  Difficulty ${d.fromLevel} → ${d.toLevel} (${reason})`;
        }
        case 'taskPaused':
          return `${seq}  Task paused`;
        case 'taskResumed':
          return typeof d.pausedDurationMs === 'number'
            ? `${seq}  Task resumed — paused ${(d.pausedDurationMs / 1000).toFixed(1)} s`
            : `${seq}  Task resumed`;
        case 'taskFinished':
          return `${seq}  Task finished — ${(d.reason || '').replace(/_/g, ' ')}`;
        case 'taskCompleted':
          return `${seq}  Task completed`;
        case 'configChanged':
          return `${seq}  Config changed — ${(d.changes || []).length} option${(d.changes || []).length !== 1 ? 's' : ''}`;
        case 'error':
          return `${seq}  ⚠ Error: ${d.code ?? 'unknown'} (${d.severity ?? 'unknown'})`;
        default:
          return `${seq}  ${d.eventType}`;
      }
    }

    function getEventRowClass(d) {
      if (d.eventType === 'roundSubmitted') return d.isCorrect ? 'ev-correct' : 'ev-wrong';
      if (d.eventType === 'error') return 'ev-error';
      if (d.eventType === 'taskFinished' || d.eventType === 'taskCompleted') return 'ev-finish';
      return '';
    }

    // Shared row renderer — used by both the live event log and the log viewer.
    function createEventRow(detail) {
      const row = document.createElement('details');
      const cls = getEventRowClass(detail);
      row.className = cls ? `ev-row ${cls}` : 'ev-row';
      const summary = document.createElement('summary');
      summary.textContent = formatEventSummary(detail);
      row.appendChild(summary);
      const pre = document.createElement('pre');
      pre.className = 'ev-detail';
      pre.textContent = JSON.stringify(detail, null, 2);
      row.appendChild(pre);
      return row;
    }

    function addEventToLog(detail) {
      const list = document.getElementById('event-log-list');
      const body = document.getElementById('event-log-body');
      const empty = document.getElementById('event-log-empty');
      if (empty) empty.style.display = 'none';

      // Capture scroll position before appending so scrollHeight reflects old content.
      const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 4;

      list.appendChild(createEventRow(detail));

      // Only auto-scroll when already pinned to the bottom — avoids jerking the
      // user away from a row they scrolled up to read or expanded.
      if (atBottom) body.scrollTop = body.scrollHeight;
    }

    function clearEventLog() {
      document.getElementById('event-log-list').innerHTML = '';
      const empty = document.getElementById('event-log-empty');
      if (empty) empty.style.display = '';
    }

    document.getElementById('clear-log-btn').addEventListener('click', clearEventLog);

    function setValMsg(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = text || '';
      el.classList.toggle('visible', !!text);
    }

    function validateDifficultySettings() {
      const start = parseInt(cfg.startlvl, 10);
      const min = parseInt(cfg.minlvl, 10);
      const max = parseInt(cfg.maxlvl, 10);

      const minMaxConflict = min > max;

      setValMsg(
        'val_maxlvl',
        minMaxConflict
          ? `Max difficulty must be ≥ Min difficulty (${min}). The component will swap them automatically.`
          : null,
      );
      setValMsg(
        'val_minlvl',
        minMaxConflict
          ? `Min difficulty must be ≤ Max difficulty (${max}). The component will swap them automatically.`
          : null,
      );

      // Only validate start when min/max are consistent — otherwise the message
      // label would reference swapped effective values and confuse the researcher.
      let startMsg = null;
      if (!minMaxConflict) {
        if (start < min) {
          startMsg = `Must be ≥ Min difficulty (${min}). The component will use ${min} instead.`;
        } else if (start > max) {
          startMsg = `Must be ≤ Max difficulty (${max}). The component will use ${max} instead.`;
        }
      }
      setValMsg('val_startlvl', startMsg);
    }

    function syncDependentStates() {
      document.getElementById('wrap_thr').classList.toggle('disabled-soft', !cfg.flow);
      document.getElementById('wrap_round_duration').classList.toggle('disabled-soft', !cfg.roundTimer);
      document.getElementById('wrap_seed').classList.toggle('disabled-soft', cfg.order !== 'fixed');
      validateDifficultySettings();
    }

    /* ---- Snippet generator ---- */
    function buildSnippetParts(c) {
      const attrs = [];
      attrs.push(['task-duration', c.totaltlmin]);
      attrs.push(['start-difficulty', c.startlvl]);
      if (c.minlvl !== '1') attrs.push(['min-difficulty', c.minlvl]);
      attrs.push(['max-difficulty', c.maxlvl]);
      attrs.push(['adaptive-difficulty', c.flow]);
      if (c.flow) {
        attrs.push(['correct-streak-for-level-up', c.up]);
        attrs.push(['wrong-streak-for-level-down', c.down]);
      }
      attrs.push(['number-of-options', normalizeInvoiceCount(c.perround)]);
      attrs.push(['invoice-order', c.order]);
      if (c.order === 'fixed' && c.randomSeed) attrs.push(['random-seed', c.randomSeed]);
      if (c.max > 0) attrs.push(['max-submissions', c.max]);
      if (c.maxCorrect > 0) attrs.push(['max-correct-submissions', c.maxCorrect]);
      attrs.push(['show-feedback', c.fb]);
      attrs.push(['show-timer', c.tl]);
      if (c.lvl) attrs.push(['show-difficulty', true]);
      if (c.completedMsgTouched) attrs.push(['completed-message', c.completedMsg]);
      if (c.logLevel !== 'basic') attrs.push(['log-level', c.logLevel]);
      if (c.mutedEvents.size > 0) attrs.push(['muted-events', Array.from(c.mutedEvents).join(',')]);
      if (c.roundTimer && c.roundDuration > 0) attrs.push(['round-duration', c.roundDuration]);
      if (c.sessionId) attrs.push(['session-id', c.sessionId]);
      if (c.autoStart) attrs.push(['auto-start', true]);

      const attrHtml = attrs
        .map(([k, v]) => {
          const attrVal = escAttr(String(v));
          const dispVal = escHtml(attrVal);
          return `\n  <span class="a">${k}</span>=<span class="v">"${dispVal}"</span>`;
        })
        .join('');

      // CSS vars — only emit when non-default
      const colorVarIds = {
        '--invoice-task-primary-color': 'c_color_primary',
        '--invoice-task-background': 'c_color_bg',
        '--invoice-task-border-color': 'c_color_border',
        '--invoice-task-highlight-color': 'c_color_hi',
      };
      const cssLines = [];
      for (const [varName, elId] of Object.entries(colorVarIds)) {
        const val = document.getElementById(elId).value;
        if (val.toLowerCase() !== CSS_DEFAULTS[varName]) {
          cssLines.push(`    ${varName}: ${val};`);
        }
      }
      const font = safeCssValue(document.getElementById('c_font').value.trim());
      if (font) cssLines.push(`    --invoice-task-font-family: ${escHtml(font)};`);

      let styleBlock = '';
      if (cssLines.length > 0) {
        styleBlock =
          `<span class="k">&lt;style&gt;</span>\n` +
          `  invoice-matching-task {\n` +
          cssLines.join('\n') + '\n' +
          `  }\n` +
          `<span class="k">&lt;/style&gt;</span>\n\n`;
      }

      return { attrHtml, styleBlock };
    }

    function renderOTreeUnifiedSnippet(c) {
      const { attrHtml, styleBlock } = buildSnippetParts(c);
      return (
        `<span class="c">&lt;!-- Paste this element into invoice_task_unified's InvoiceTaskUnified.html, --&gt;</span>\n` +
        `<span class="c">&lt;!-- in the participant branch (after {{ else }} — leave the operator --&gt;</span>\n` +
        `<span class="c">&lt;!-- branch above it alone). Works whether Adaptive difficulty is on or --&gt;</span>\n` +
        `<span class="c">&lt;!-- off — the operator page adapts to it at runtime. --&gt;</span>\n` +
        `\n` +
        styleBlock +
        `<span class="k">&lt;invoice-matching-task</span>${attrHtml}<span class="k">&gt;&lt;/invoice-matching-task&gt;</span>\n`
      );
    }

    function updateSnippet() {
      document.getElementById('snippet').innerHTML = renderOTreeUnifiedSnippet(cfg);
    }

    /* ---- Control bindings ---- */
    // Init-only options: changing these requires a preview restart.
    const INIT_KEYS = new Set([
      'startlvl', 'minlvl', 'maxlvl',
      'totaltlmin', 'roundTimer', 'roundDuration',
      'perround', 'order', 'randomSeed',
    ]);

    const bind = (id, key, type) => {
      const el = document.getElementById(id);
      el.addEventListener(type === 'check' ? 'change' : 'input', () => {
        if (type === 'check') cfg[key] = el.checked;
        else if (type === 'num') cfg[key] = Math.round(+el.value);
        else cfg[key] = el.value; // 'val' (select) or 'text' (text input)
        syncDependentStates();
        if (INIT_KEYS.has(key)) {
          rebuildPreview();
        } else {
          applyLiveOptions();
        }
        updateSnippet();
      });
    };

    bind('c_autostart', 'autoStart', 'check');
    bind('c_flow', 'flow', 'check');
    bind('c_startlvl', 'startlvl', 'val');
    bind('c_minlvl', 'minlvl', 'val');
    bind('c_maxlvl', 'maxlvl', 'val');
    bind('c_up', 'up', 'num');
    bind('c_down', 'down', 'num');
    bind('c_fb', 'fb', 'check');
    bind('c_lvl', 'lvl', 'check');
    bind('c_tl', 'tl', 'check');
    bind('c_totaltl_min', 'totaltlmin', 'num');
    bind('c_round_timer', 'roundTimer', 'check');
    bind('c_round_duration', 'roundDuration', 'num');
    bind('c_max', 'max', 'num');
    bind('c_maxcorrect', 'maxCorrect', 'num');
    bind('c_perround', 'perround', 'num');
    bind('c_sessionid', 'sessionId', 'text');
    bind('c_seed', 'randomSeed', 'text');
    // completedMsg needs a touched flag so "" (explicit empty) is distinguishable from
    // "never changed" (use component default, don't emit the attribute).
    document.getElementById('c_completedmsg').addEventListener('input', (e) => {
      cfg.completedMsg = e.target.value;
      cfg.completedMsgTouched = true;
      applyLiveOptions();
      updateSnippet();
    });

    // Invoice order segmented control
    document.querySelectorAll('#seg_order button').forEach((b) =>
      b.addEventListener('click', () => {
        document.querySelectorAll('#seg_order button').forEach((x) => x.classList.remove('on'));
        b.classList.add('on');
        cfg.order = b.dataset.v;
        syncDependentStates();
        rebuildPreview();
        updateSnippet();
      }),
    );

    // Log level segmented control (live option)
    document.querySelectorAll('#seg_loglevel button').forEach((b) =>
      b.addEventListener('click', () => {
        document.querySelectorAll('#seg_loglevel button').forEach((x) => x.classList.remove('on'));
        b.classList.add('on');
        cfg.logLevel = b.dataset.v;
        applyLiveOptions();
        updateSnippet();
      }),
    );

    // Muted events checkboxes (live option)
    document.querySelectorAll('#muted_checks input[type="checkbox"]').forEach((cb) =>
      cb.addEventListener('change', () => {
        if (cb.checked) cfg.mutedEvents.add(cb.dataset.ev);
        else cfg.mutedEvents.delete(cb.dataset.ev);
        applyLiveOptions();
        updateSnippet();
      }),
    );

    // CSS var controls (applied live to element; not a component config option)
    ['c_color_primary', 'c_color_bg', 'c_color_border', 'c_color_hi', 'c_font'].forEach((id) =>
      document.getElementById(id).addEventListener('input', () => {
        applyCssVars();
        updateSnippet();
      }),
    );

    document.getElementById('copyBtn').addEventListener('click', () => {
      const txt = document.getElementById('snippet').innerText;
      navigator.clipboard?.writeText(txt);
      const b = document.getElementById('copyBtn');
      b.textContent = 'copied';
      setTimeout(() => (b.textContent = 'copy'), 1200);
    });


    /* ---- Download InvoiceTaskUnified.html (Live oTree style) ---- */
    // Mirrors examples/otree/demo-app/invoice_task_unified/InvoiceTaskUnified.html.
    // Keep this in sync if that file changes. Its own inline scripts avoid
    // backtick template literals on purpose (same reason each closing script
    // tag below is written as <\/script>) — a nested interpolation would
    // otherwise be evaluated by this file's own template literal instead of
    // staying literal text. Note: the closing tag must stay escaped even in
    // comments like this one — the HTML parser scans raw script-tag text for
    // that exact sequence regardless of JS syntax, so writing it out plainly
    // anywhere in this block, including in a comment, would end the
    // surrounding <script> tag early.
    const INVOICE_TASK_UNIFIED_TEMPLATE = `{{ block title }}
    Invoice Matching Task (Unified Difficulty Control)
{{ endblock }}

{{ block content }}

{{ if is_operator }}

<!--
  Operator page. Sits in the same oTree Group as the participant
  (PLAYERS_PER_GROUP = 2) and reaches them via live_method group-push
  (yield {other_player.id_in_group: ...}).

  What this page shows is decided at runtime by the participant's
  taskStarted.effectiveConfig.adaptiveDifficulty.
-->
<div id="operator-panel" style="max-width: 420px;">
    <h3>Invoice Matching Task — operator view</h3>
    <p id="waiting-placeholder">Waiting for participant to start…</p>

    <div id="metrics-panel" style="display:none; margin-top: 12px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em;">
        <strong>Live metrics</strong>
        <table style="width: 100%; margin-top: 6px;">
            <tr><td>Rounds submitted</td><td style="text-align:right"><span id="m-num-rounds">0</span></td></tr>
            <tr><td>Correct</td><td style="text-align:right"><span id="m-num-correct">0</span></td></tr>
            <tr><td>Accuracy</td><td style="text-align:right"><span id="m-accuracy">–</span></td></tr>
            <tr><td>Mean reaction time</td><td style="text-align:right"><span id="m-mean-rt">–</span></td></tr>
            <tr><td>Median reaction time</td><td style="text-align:right"><span id="m-median-rt">–</span></td></tr>
            <tr><td>Best streak</td><td style="text-align:right"><span id="m-best-streak">0</span></td></tr>
            <tr><td>Max difficulty reached</td><td style="text-align:right"><span id="m-max-difficulty">–</span></td></tr>
        </table>
    </div>

    <div id="adaptive-explainer" style="display:none; margin-top: 12px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; color: #666;">
        The built-in adaptive algorithm is controlling difficulty — no operator action available.
    </div>

    <div id="control-panel" style="display:none; margin-top: 12px;">
        <h3>Difficulty control</h3>
        <p id="mode-indicator" style="font-weight: bold;">Loading…</p>
        <p style="color: #666; font-size: 0.9em;">
            Clicking any level below takes over control from the algorithm —
            permanently for this run. There is no "return to algorithm" button.
        </p>
        <div id="level-buttons"></div>
        <div id="status-panel" style="margin-top: 12px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em;">
            <strong>Live status</strong>
            <table style="width: 100%; margin-top: 6px;">
                <tr><td>Round</td><td style="text-align:right"><span id="s-round">–</span></td></tr>
                <tr><td>Current difficulty</td><td style="text-align:right"><span id="s-difficulty">–</span></td></tr>
                <tr><td>Last submission</td><td style="text-align:right"><span id="s-correct">–</span></td></tr>
            </table>

<script>
  window.addEventListener('load', () => {
    const waitingPlaceholder = document.querySelector('#waiting-placeholder');
    const metricsPanel = document.querySelector('#metrics-panel');
    const adaptiveExplainer = document.querySelector('#adaptive-explainer');
    const controlPanel = document.querySelector('#control-panel');
    const modeIndicator = document.querySelector('#mode-indicator');
    const buttonsDiv = document.querySelector('#level-buttons');
    const decisionLog = document.querySelector('#decision-log');
    const sRound = document.querySelector('#s-round');
    const sDifficulty = document.querySelector('#s-difficulty');
    const sCorrect = document.querySelector('#s-correct');

    let modeRevealed = false;

    // Runs exactly once, the first time the server confirms the real
    // adaptiveDifficulty (either via the participant's taskStarted push, or
    // an init sync after the participant has already started). Locked in
    // permanently afterwards — adaptiveDifficulty is an init-only component
    // option, so it cannot change mid-run.
    function revealMode(adaptive) {
      if (modeRevealed) return;
      modeRevealed = true;
      waitingPlaceholder.style.display = 'none';
      metricsPanel.style.display = '';
      adaptiveExplainer.style.display = adaptive ? '' : 'none';
      controlPanel.style.display = adaptive ? 'none' : '';
    }

    // Renders exactly the configured [min, max] range — showing more buttons
    // than the task actually supports would let the operator click a level
    // that gets silently rejected server-side with no feedback.
    function renderLevelButtons(min, max) {
      buttonsDiv.innerHTML = '';
      for (let lvl = min; lvl <= max; lvl++) {
        const btn = document.createElement('button');
        btn.type = 'button'; // otherwise it defaults to type="submit" inside oTree's page <form> and advances the page
        btn.textContent = 'Set level ' + lvl;
        btn.style.margin = '2px';
        btn.addEventListener('click', () => liveSend({ setLevel: lvl }));
        buttonsDiv.appendChild(btn);
      }
    }

    function renderControlMode(mode) {
      modeIndicator.textContent = mode === 'manual'
        ? 'Manual — you are in control'
        : 'Automatic — algorithm is in control';
    }

    function logDecision(text) {
      const li = document.createElement('li');
      li.textContent = text;
      decisionLog.appendChild(li);
    }

    function updateMetricsPanel(m) {
      document.querySelector('#m-num-rounds').textContent = m.numRounds;
      document.querySelector('#m-num-correct').textContent = m.numCorrect;
      document.querySelector('#m-accuracy').textContent =
        m.numRounds > 0 ? Math.round(m.accuracy * 100) + '%' : '–';
      document.querySelector('#m-mean-rt').textContent =
        m.meanReactionTimeMs != null ? Math.round(m.meanReactionTimeMs) + ' ms' : '–';
      document.querySelector('#m-median-rt').textContent =
        m.medianReactionTimeMs != null ? Math.round(m.medianReactionTimeMs) + ' ms' : '–';
      document.querySelector('#m-best-streak').textContent = m.bestStreak;
      document.querySelector('#m-max-difficulty').textContent = m.maxDifficultyReached;
    }

    window.liveRecv = function (response) {
      if (!response) return;
      if (typeof response.adaptiveDifficulty === 'boolean') {
        revealMode(response.adaptiveDifficulty);
      }
      if (response.controlMode) renderControlMode(response.controlMode);
      if (typeof response.minDifficulty === 'number' && typeof response.maxDifficulty === 'number') {
        renderLevelButtons(response.minDifficulty, response.maxDifficulty);
      }
      if (response.metrics) updateMetricsPanel(response.metrics);
      if (typeof response.ack === 'number') logDecision('You set difficulty to ' + response.ack);
      if (response.detail) {
        sRound.textContent = response.detail.roundIndex;
        sDifficulty.textContent = response.detail.currentDifficulty;
        sCorrect.textContent = response.detail.isCorrect ? 'Correct' : 'Wrong';
      }
      if (response.lastChange) {
        logDecision('Algorithm set difficulty to ' + response.lastChange.level);
      }
      if (response.done) {
        document.querySelector('.otree-btn-next')?.click();
      }
    };

    liveSocket.addEventListener('open', () => liveSend({ init: true }));
  });
<\/script>

{{ else }}

-->
<invoice-matching-task

<div style="display:none">{{ next_button }}</div>

<script src="{{ static 'invoice_task_unified/invoice-matching-task.js' }}"><\/script>
<script>
  window.addEventListener('load', () => {
    const task = document.querySelector('invoice-matching-task');
    let started = false;
    let pendingEvents = [];

    window.liveRecv = function (response) {
      if (!response) return;
      if (typeof response.setDifficulty === 'number') {
        task.setDifficulty(response.setDifficulty);
      }
      if (response.done) {
        document.querySelector('.otree-btn-next')?.click();
      }
    };

    function flushPendingEvents() {
      if (liveSocket.readyState !== WebSocket.OPEN) return;
      while (pendingEvents.length > 0) {
        liveSend({ event: pendingEvents.shift() });
      }
    }
    liveSocket.addEventListener('open', flushPendingEvents);

    task.addEventListener('invoiceTaskEvent', (event) => {
      if (event.detail.eventType === 'taskStarted') {
        started = true;
      }
      if (liveSocket.readyState === WebSocket.OPEN) {
        liveSend({ event: event.detail });
      } else {
        pendingEvents.push(event.detail);
      }
    });

    function tryAutoStart(attempt) {
      if (started) return;
      if (typeof task.start === 'function') {
        task.start();
      }
      if (attempt < 100) {
        setTimeout(() => tryAutoStart(attempt + 1), 100);
      }
    }
    customElements.whenDefined('invoice-matching-task').then(() => tryAutoStart(0));
  });
<\/script>

{{ endif }}

    const DEFAULT_UNIFIED_ELEMENT = `<invoice-matching-task
    task-duration="120"
    start-difficulty="1"
    max-submissions="20"
    log-level="basic">
</invoice-matching-task>`;

    // innerHTML/textContent round-trip strips the syntax-highlighting spans and
    // decodes entities, then drops the "paste this into..." comment, which
    // doesn't apply once the element is already substituted into the real file.
    function getOTreeUnifiedElementText(c) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderOTreeUnifiedSnippet(c);
      return tmp.textContent.replace(/^(?:<!--[^]*?-->\n)+\n*/, '').trimEnd();
    }

    function generateInvoiceTaskUnifiedHtml(c) {
      const configuredElement = getOTreeUnifiedElementText(c);
      // If InvoiceTaskUnified.html's default element ever drifts from
      // DEFAULT_UNIFIED_ELEMENT, .replace() would silently no-op and ship the
      // stale default instead of the configured element — fail loudly instead.
      if (!INVOICE_TASK_UNIFIED_TEMPLATE.includes(DEFAULT_UNIFIED_ELEMENT)) {
        throw new Error(
          'INVOICE_TASK_UNIFIED_TEMPLATE no longer contains DEFAULT_UNIFIED_ELEMENT — ' +
          'update both to match the current invoice_task_unified/InvoiceTaskUnified.html.'
        );
      }
      return INVOICE_TASK_UNIFIED_TEMPLATE.replace(DEFAULT_UNIFIED_ELEMENT, configuredElement);
    }

    document.getElementById('downloadLiveHtmlBtn').addEventListener('click', () => {
      const filename = 'InvoiceTaskUnified.html';
      let html;
      try {
        html = generateInvoiceTaskUnifiedHtml(cfg);
      } catch (err) {
        alert('Could not generate ' + filename + ': ' + err.message);
        return;
      }
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 0);
    });

    /* ---- Top-level tab switching ---- */
    function activateTopTab(name) {
      ['configure', 'gencode'].forEach(function (id) {
        const tab = document.getElementById('toptab-' + id);
        const panel = document.getElementById('panel-' + id);
        const isActive = id === name;
        tab.classList.toggle('on', isActive);
        tab.setAttribute('aria-selected', String(isActive));
        panel.hidden = !isActive;
      });
    }
    document.getElementById('toptab-configure').addEventListener('click', () => activateTopTab('configure'));
    document.getElementById('toptab-gencode').addEventListener('click', () => activateTopTab('gencode'));

    /* ---- Collapsible config groups ---- */
    document.querySelectorAll('.group > .glabel').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const group = btn.closest('.group');
        const isOpen = group.classList.toggle('group--open');
        btn.setAttribute('aria-expanded', String(isOpen));
      });
    });

    /* ---- Init ---- */
    syncDependentStates();
    rebuildPreview();
    updateSnippet();

    /* ---- Config-surface self-check ----
       Builds a snippet from a maxed-out config and asserts every supported
       option is reachable as an emitted attribute. Logs an error (only on
       failure) if a future edit drops a control. */
    (function assertFullConfigSurface() {
      const EXPECTED = [
        'task-duration', 'round-duration', 'session-id', 'auto-start',
        'start-difficulty', 'min-difficulty', 'max-difficulty', 'adaptive-difficulty',
        'correct-streak-for-level-up', 'wrong-streak-for-level-down', 'number-of-options',
        'invoice-order', 'random-seed', 'max-submissions', 'max-correct-submissions',
        'show-timer', 'show-feedback', 'show-difficulty', 'completed-message',
        'log-level', 'muted-events',
      ];
      const full = {
        autoStart: true, flow: true, startlvl: '2', minlvl: '2', maxlvl: '5',
        up: 3, down: 3, fb: true, lvl: true, tl: true, totaltlmin: 120,
        roundTimer: true, roundDuration: 30, max: 20, maxCorrect: 10, perround: 8,
        order: 'fixed', sessionId: 's1', randomSeed: 'seed', completedMsg: 'done',
        completedMsgTouched: true, logLevel: 'detailed', mutedEvents: new Set(['roundStarted']),
      };
      const { attrHtml } = buildSnippetParts(full);
      const emitted = (attrHtml.match(/class="a">([a-z-]+)</g) || []).map((s) =>
        s.replace('class="a">', '').replace('<', ''),
      );
      const missing = EXPECTED.filter((a) => !emitted.includes(a));
      if (missing.length) {
        console.error(
          '[configurator] config surface incomplete — these options have no control/snippet output:',
          missing,
        );
      }
    })();
  </script>
